<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1C1C1E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="App Control">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="App Control">
  <meta name="description" content="Control your chat app — turn ON/OFF">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <title>App Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #1C1C1E;
      --card: #2C2C2E;
      --card2: #3A3A3C;
      --text: #FFFFFF;
      --text2: #8E8E93;
      --green: #34C759;
      --red: #FF3B30;
      --gray: #8E8E93;
      --blue: #007AFF;
      --radius: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      padding: 56px 20px 16px;
      text-align: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header p {
      font-size: 14px;
      color: var(--text2);
      margin-top: 4px;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 32px;
    }
    .status-section {
      text-align: center;
    }
    .status-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      transition: background 0.4s, box-shadow 0.4s;
      background: var(--gray);
      box-shadow: 0 0 40px rgba(142, 142, 147, 0.3);
    }
    .status-circle.on {
      background: var(--green);
      box-shadow: 0 0 60px rgba(52, 199, 89, 0.4);
    }
    .status-circle.off {
      background: var(--red);
      box-shadow: 0 0 60px rgba(255, 59, 48, 0.4);
    }
    .status-circle.unknown {
      background: var(--gray);
      box-shadow: 0 0 40px rgba(142, 142, 147, 0.3);
    }
    .status-label {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      transition: color 0.3s;
    }
    .status-label.on { color: var(--green); }
    .status-label.off { color: var(--red); }
    .status-label.unknown { color: var(--gray); }
    .status-desc {
      font-size: 15px;
      color: var(--text2);
      margin-top: 8px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }
    .btn {
      padding: 16px 24px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.97); opacity: 0.8; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .btn-on { background: var(--green); color: #fff; }
    .btn-off { background: var(--red); color: #fff; }
    .btn-refresh {
      background: var(--card);
      color: var(--blue);
      font-size: 15px;
      padding: 12px 20px;
    }
    .btn-install {
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      padding: 12px 20px;
      display: none;
    }
    .btn-install.show { display: flex; }
    .footer {
      padding: 16px 20px 32px;
      text-align: center;
      flex-shrink: 0;
    }
    .last-checked {
      font-size: 12px;
      color: var(--text2);
    }
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card2);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
      max-width: 90%;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #F2F2F7;
        --card: #FFFFFF;
        --card2: #E5E5EA;
        --text: #000000;
        --text2: #8E8E93;
      }
      .btn-refresh { background: var(--card); border: 0.5px solid rgba(60,60,67,0.12); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚙️ App Control</h1>
    <p>Telegram bot replacement</p>
  </div>

  <div class="content">
    <div class="status-section">
      <div class="status-circle unknown" id="statusCircle">⏳</div>
      <div class="status-label unknown" id="statusLabel">Checking...</div>
      <div class="status-desc" id="statusDesc">Connecting to server</div>
    </div>

    <div class="actions">
      <button class="btn btn-on" id="btnOn" onclick="toggleApp(true)">✅ Turn ON</button>
      <button class="btn btn-off" id="btnOff" onclick="toggleApp(false)">❌ Turn OFF</button>
      <button class="btn btn-refresh" id="btnRefresh" onclick="refreshStatus()">🔄 Refresh</button>
      <button class="btn btn-install" id="btnInstall" onclick="installPWA()">📲 Install App</button>
    </div>
  </div>

  <div class="footer">
    <div class="last-checked" id="lastChecked">—</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'https://yutube-com-pcu9.onrender.com';
    let deferredPrompt = null;

    // ---- PWA Install ----
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('btnInstall').classList.add('show');
    });
    window.addEventListener('appinstalled', function() {
      deferredPrompt = null;
      document.getElementById('btnInstall').classList.remove('show');
      showToast('✅ App installed!');
    });

    function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(choice) {
        if (choice.outcome === 'accepted') showToast('✅ Installing...');
        deferredPrompt = null;
        document.getElementById('btnInstall').classList.remove('show');
      });
    }

    // ---- Toast ----
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._hide);
      t._hide = setTimeout(function() { t.classList.remove('show'); }, 2500);
    }

    // ---- Get Status ----
    function getStatus(cb) {
      fetch(API + '/api/admin/status?t=' + Date.now(), { cache: 'no-store' })
        .then(function(r) { return r.json(); })
        .then(function(d) { cb(d.enabled); })
        .catch(function() { cb(null); });
    }

    // ---- Toggle ----
    function toggleApp(enabled) {
      var btn = enabled ? 'btnOn' : 'btnOff';
      document.getElementById(btn).disabled = true;
      document.getElementById(btn).textContent = '⏳ Please wait...';

      fetch(API + '/api/admin/toggle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: enabled })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        showToast(enabled ? '✅ App turned ON' : '❌ App turned OFF');
        updateUI(d.enabled);
      })
      .catch(function() {
        showToast('⚠️ Failed to connect to server');
        getStatus(function(enabled) { updateUI(enabled); });
      })
      .finally(function() {
        document.getElementById(btn).disabled = false;
        document.getElementById(btn).textContent = enabled ? '✅ Turn ON' : '❌ Turn OFF';
      });
    }

    // ---- Refresh ----
    function refreshStatus() {
      var btn = document.getElementById('btnRefresh');
      btn.disabled = true;
      btn.textContent = '⏳ Refreshing...';
      getStatus(function(enabled) {
        updateUI(enabled);
        showToast(enabled === null ? '⚠️ Unknown' : (enabled ? '🟢 App is ON' : '🔴 App is OFF'));
        btn.disabled = false;
        btn.textContent = '🔄 Refresh';
      });
    }

    // ---- Update UI ----
    function updateUI(enabled) {
      var circle = document.getElementById('statusCircle');
      var label = document.getElementById('statusLabel');
      var desc = document.getElementById('statusDesc');
      var now = new Date();
      var timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('lastChecked').textContent = 'Last checked: ' + timeStr;

      circle.className = 'status-circle';
      label.className = 'status-label';

      if (enabled === null) {
        circle.classList.add('unknown');
        circle.textContent = '⚠️';
        label.classList.add('unknown');
        label.textContent = 'Unknown';
        desc.textContent = 'Could not reach server';
      } else if (enabled) {
        circle.classList.add('on');
        circle.textContent = '✅';
        label.classList.add('on');
        label.textContent = 'ON';
        desc.textContent = 'All users can access the app';
      } else {
        circle.classList.add('off');
        circle.textContent = '❌';
        label.classList.add('off');
        label.textContent = 'OFF';
        desc.textContent = 'Users see maintenance page';
      }
    }

    // ---- Init ----
    getStatus(function(enabled) { updateUI(enabled); });

    // Auto-refresh every 30s
    setInterval(function() {
      getStatus(function(enabled) { updateUI(enabled); });
    }, 30000);

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>
</body>
</html>
